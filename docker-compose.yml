version: "3.9"

services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server
    ports:
      - "${PORT}:8080"
    volumes:
      - ${MODEL_PATH}:/models
    command: >
      -m /models/${MODEL_FILE}
      --host 0.0.0.0
      --port 8080
    restart: unless-stopped